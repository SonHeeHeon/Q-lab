# =============================================================================
# Q-Lab — Alembic Configuration
# =============================================================================
# Two logical databases are managed under ONE migrations folder
# (shared/db/migrations). The `env.py` switches the target database based on
# the `--name` flag.
#
#   $ uv run alembic --name service upgrade head
#   $ uv run alembic --name research upgrade head
#
# Targets:
#   service  → SQLite at $SERVICE_DB_PATH  (runtime: portfolio, alerts, journal)
#   research → SQLite at $RESEARCH_DB_PATH (historical: prices, financials, factors)
# =============================================================================

[alembic]
script_location = shared/db/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[service]
script_location = shared/db/migrations
prepend_sys_path = .
version_locations = shared/db/migrations/versions/service
version_path_separator = os
sqlalchemy.url = sqlite:///data/service.db

[research]
script_location = shared/db/migrations
prepend_sys_path = .
version_locations = shared/db/migrations/versions/research
version_path_separator = os
sqlalchemy.url = sqlite:///data/research.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
